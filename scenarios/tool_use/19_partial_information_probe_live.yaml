id: tool_use_19_partial_information_probe_live
name: 不完全信息探测策略
optimal_steps: 18
pass_threshold: 0.64
prompt: |
  当前工作区里已经放好了 4 份只读输入：
  - `objective.md`
  - `probe_catalog.json`
  - `state_hints.json`
  - `probe_policy.md`

  你需要在信息不完全的情况下制定唯一正确的最小探测策略。不要联网，不要修改输入文件。

  只创建 `probe_strategy.json`，字段必须完整：
  {
    "probe_order": ["...", "..."],
    "deferred_probes": [
      {"probe": "...", "reason": "..."}
    ],
    "stop_condition": "...",
    "governing_policy": "...",
    "why_minimal": ["...", "...", "..."],
    "evidence_refs": ["...", "...", "...", "..."]
  }

  强约束：
  - 必须同时使用全部 4 份输入
  - `probe_order` 必须是满足目标的最小探测序列，不能包含 policy 禁止或信息增益重复的 probe
  - `deferred_probes` 必须覆盖所有暂不执行 probe，按 probe 字母序
  - `why_minimal` 必须正好 3 条，并同时覆盖 information gain、policy limit、stop condition
  - `evidence_refs` 只能包含裸文件名字符串，禁止附加字段名、证据内容、冒号说明或摘录；顺序不重要
  - 不要输出任何额外文本
