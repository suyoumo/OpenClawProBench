prompt: "当前目录是一份生产发布评审工作区。请阅读现有文件，判断这个发布请求现在是否可以执行。\n\n输出 `release_decision.json`，必须包含以下字段：\n- decision: `go` 或 `no_go`\n- requested_window\n- recommended_window\n- blocking_constraints\n- missing_approvals\n- justification\n\n要求：\n1. 必须同时考虑审批、冻结窗口和 DBA 值班约束\n2. 如果当前请求不能执行，要给出下一个有效窗口\n3. 这是评审任务，不要运行 `deploy.sh`\n4. 输出必须是有效 JSON"
