prompt: |
  你需要处理一个发布请求。工作区中有以下文件：
  - `request.json` - 发布请求详情
  - `policy.yaml` - 审批政策
  - `approvers.yaml` - 审批人列表和状态
  - `calendar.json` - 冻结窗口日历
  - `risk_matrix.yaml` - 风险评估矩阵
  
  根据以下嵌套约束判断是否可以发布：
  
  **第一层约束 - 时间窗口**
  - 检查请求的发布时间是否在冻结窗口内
  - 如果在冻结窗口，必须满足例外条件
  
  **第二层约束 - 审批状态**
  - 根据风险等级确定需要的审批级别
  - 每个级别有特定的审批人要求
  - 审批人必须在指定时间窗口内批准
  
  **第三层约束 - 依赖项**
  - 检查依赖的服务是否就绪
  - 检查前置发布是否完成
  - 检查回滚计划是否存在
  
  **第四层约束 - 资源限制**
  - 检查服务器资源是否充足
  - 检查数据库连接池是否有余量
  - 检查监控系统是否正常
  
  输出 `decision.json`，包含：
  - `decision`: "approved" / "rejected" / "conditional"
  - `constraints_checked`: 按顺序列出检查的约束
  - `violations`: 违反的约束列表
  - `conditions`: 如果是 conditional，需要满足的条件
  - `reasoning`: 决策理由
  
  **重要**：必须按照约束层次顺序检查，不能跳过任何一层。
