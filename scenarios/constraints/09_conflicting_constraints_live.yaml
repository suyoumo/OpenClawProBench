objective: 正确识别内存、兼容性、安全、预算和时限之间的冲突，选择唯一满足全部硬约束的 option，并输出 exact phased plan。
expected_outcome: A correct upgrade_strategy.json with the exact selected option, summary metrics, conflict assessment, memory relief actions, phase plan, rejected options, rollback plan, and evidence refs.
