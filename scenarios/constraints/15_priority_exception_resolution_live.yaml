prompt: |
  当前工作区里已经放好了 4 份只读输入：
  - `request_queue.json`
  - `exception_policy.md`
  - `priority_matrix.json`
  - `resolution_contract.json`

  你需要为当前冲突请求解析唯一正确的优先级决议。不要联网，不要修改输入文件。

  只创建 `priority_exception_resolution.json`，字段必须完整：
  {
    "winning_request": "...",
    "denied_exceptions": [
      {"request": "...", "reason": "..."}
    ],
    "rule_chain": ["...", "...", "..."],
    "governing_exception": "...",
    "evidence_refs": ["...", "...", "...", "..."]
  }

  强约束：
  - 必须同时使用全部 4 份输入
  - 先满足基础优先级，再判断是否存在合法例外覆盖；不能把无效例外当成生效
  - `denied_exceptions` 必须覆盖所有未生效例外，按 request 字母序
  - `rule_chain` 必须正好 3 条，并按实际生效顺序排列
  - `evidence_refs` 只能包含裸文件名字符串，禁止附加字段名、证据内容、冒号说明或摘录；顺序不重要
  - 不要输出任何额外文本
