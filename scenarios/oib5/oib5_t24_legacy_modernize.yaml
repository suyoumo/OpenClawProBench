prompt: '当前目录有一个 `legacy_app.py`，是 Python 2 风格的代码（print 语句、unicode 处理、旧式类等）。


  请完成：

  1. 将代码现代化为 Python 3（修复所有 Python 2 语法）

  2. 保持功能不变

  3. 编写 `test_legacy_app.py`，至少 10 个测试用例，覆盖所有公共方法，并覆盖正常路径、边界条件、异常路径

  4. 测试必须显式覆盖这些语义：同名商品重复 `add_item()` 时只累计数量、不悄悄改价；失败的删除/折扣操作不能留下部分状态修改；搜索仍然大小写不敏感

  5. 所有测试必须通过，且测试应真正能发现行为回归，而不是只做 smoke test

  6. 代码中不能有 `print` 语句（包括示例入口部分，改用 logging 或删除）'
