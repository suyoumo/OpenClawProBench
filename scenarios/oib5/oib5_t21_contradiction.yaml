prompt: |
  当前目录有三个数据源，关于同一个产品 SmartWatch Pro：

  1. `source_official.json` — 官方产品数据库（更新于 3/10）
  2. `source_retailer.json` — 零售商数据（更新于 3/14）
  3. `source_reviews.txt` — 用户评价汇总（抓取于 3/15）

  三个数据源的价格、库存、评分都有冲突。

  请完成：
  1. 读取所有三个文件
  2. 分析冲突点（价格、库存、评分各不同）
  3. 基于数据时效性和可信度，给出最终判断
  4. 将分析结果保存到 `analysis.json`，格式：
     ```json
     {
       "price": {"value": 最终价格, "source": "来源", "reason": "理由"},
       "stock": {"value": "有货/无货", "source": "来源", "reason": "理由"},
       "rating": {"value": 最终评分, "source": "来源", "reason": "理由"},
       "conflicts_found": ["冲突1", "冲突2", ...]
     }
     ```
