prompt: "当前目录有三个数据文件：\n\n1. `users.json` — 用户数据（含 id, name, email, signup_date）\n\
  2. `orders.csv` — 订单数据（含 order_id, user_id, product, amount, date）\n3. `products.json`\
  \ — 产品数据（含 id, name, category, price）\n\n注意：数据中可能有脏数据（重复行、缺失值、格式不一致），需要先清洗。\n\n\
  请完成以下任务：\n\n1. 创建 `analysis.py`，读取三个数据源，清洗后计算：\n   - 每个用户的总消费金额（LTV），输出到 `user_ltv.csv`（列：user_id,\
  \ name, total_amount，按 total_amount 降序）\n   - 每个产品类别的销售总额，输出到 `category_sales.json`（格式：`{\"\
  category\": amount}`）\n   - 每月订单数量趋势，输出到 `monthly_orders.csv`（列：month, order_count，按月份升序）\n\
  \n2. 运行 `analysis.py` 确保输出正确\n\n要求：去重时按 order_id 去重；缺失 amount 的订单跳过；日期格式统一为 YYYY-MM。"
