  当前目录有三个信息源：

  1. `email_from_boss.txt` — 老板发来的邮件
  2. `project_status.txt` — 项目状态报告
  3. `team_chat.txt` — 团队聊天记录

  请阅读所有三个文件，整合信息，生成一份简洁的项目周报 `weekly_report.md`。

  要求：
  1. 周报必须包含：项目进度、关键风险、下周计划
  2. 信息必须来自所有三个源（不能只看一个）
  3. 如果信息有冲突，以最新的为准
  4. 格式：Markdown，包含三个二级标题
