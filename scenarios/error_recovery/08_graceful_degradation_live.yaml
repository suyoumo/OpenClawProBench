category: error_recovery
description: 基于真实故障状态、策略和运行手册，对 checkout 路径给出唯一正确的 graceful degradation 决策。
objective: 正确识别哪些降级方案被策略禁止，输出唯一一致的拒绝/通知/恢复决策。
expected_outcome: A correct degradation_decision.json with the exact selected strategy combination, rejected options, flow, consistency guards, response, and evidence.
