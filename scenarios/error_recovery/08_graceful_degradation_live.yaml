id: error_recovery_08_graceful_degradation_live
name: 优雅降级决策
execution_mode: live
dimension: error_recovery
difficulty: hard
benchmark_status: active
signal_source: workspace_live
benchmark_group: coverage
benchmark_core: false
weight: 1.5
timeout_seconds: 240
optimal_steps: 10
