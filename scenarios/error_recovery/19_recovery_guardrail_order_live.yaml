prompt: |
  当前工作区里已经放好了 4 份只读输入：
  - `recovery_actions.json`
  - `system_risks.md`
  - `guardrail_order.yaml`
  - `incident_goal.json`

  你需要确定恢复动作的唯一正确顺序。不要联网，不要修改输入文件。

  只创建 `recovery_guardrail_order.json`，字段必须完整：
  {
    "action_order": ["...", "...", "..."],
    "blocked_actions": [
      {"action": "...", "reason": "..."}
    ],
    "governing_guardrail": "...",
    "why_this_order": ["...", "...", "..."],
    "evidence_refs": ["...", "...", "...", "..."]
  }

  强约束：
  - 必须同时使用全部 4 份输入
  - `action_order` 必须满足 guardrail_order 中的风险前置条件，不能跳过中间必要动作
  - `blocked_actions` 必须覆盖所有当前不能执行的动作，按 action 字母序
  - `why_this_order` 必须正好 3 条，覆盖 risk, dependency, goal protection
  - `evidence_refs` 只能包含裸文件名字符串，禁止附加字段名、证据内容、冒号说明或摘录；顺序不重要
  - 不要输出任何额外文本
