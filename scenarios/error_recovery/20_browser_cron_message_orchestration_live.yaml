prompt: |
  当前工作区里已经放好了 1 份只读输入：
  - `orchestration_request.json`

  你需要先检查 status 页面；如果仍未恢复，则安排一次后续复查 cron，并生成一条极简 user update。把结果写到 `orchestration_plan.json`。

  字段必须完整：
  {
    "status_result": "...",
    "follow_up_cron": "...",
    "user_update": "...",
    "decision_chain": "..."
  }

  规则：
  - 只有在 status 页面仍未恢复时，才允许写 follow_up_cron
  - cron 分钟位不能是 0 或 30
  - user_update 必须简短
  - decision_chain 必须说明 browser -> cron -> message 的顺序
