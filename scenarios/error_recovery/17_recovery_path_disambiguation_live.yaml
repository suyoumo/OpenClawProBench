prompt: |
  当前工作区里已经放好了 4 份只读输入：
  - `incident_paths.json`
  - `system_signals.md`
  - `risk_rules.json`
  - `recovery_goal.txt`

  你需要在多个看似可行的恢复路径中选出唯一正确路径。不要联网，不要修改输入文件。

  只创建 `recovery_path_decision.json`，字段必须完整：
  {
    "chosen_path": "...",
    "ruled_out_paths": [
      {"path": "...", "reason": "..."}
    ],
    "verification_order": ["...", "...", "..."],
    "governing_risk_rule": "...",
    "evidence_refs": ["...", "...", "...", "..."]
  }

  强约束：
  - 必须同时使用全部 4 份输入
  - 不能只选最快路径，必须同时满足恢复目标和风险规则
  - `ruled_out_paths` 必须覆盖所有未选路径，按 path 字母序
  - `verification_order` 必须正好 3 条
  - 不要输出任何额外文本
