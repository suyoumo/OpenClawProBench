prompt: |
  你需要管理一个有 5 个 agent 的系统，完成一系列数据处理任务。
  
  工作区中有以下文件：
  - `agents.json` - 每个agent的能力和当前状态
  - `tasks.json` - 需要完成的任务列表
  - `resources.json` - 系统资源限制（CPU、内存、网络带宽）
  - `dependencies.json` - 任务之间的依赖关系
  
  **任务目标**：
  1. 分析所有任务和agent能力
  2. 制定任务分配和调度计划
  3. 考虑资源限制和依赖关系
  4. 生成最优的执行方案
  
  **输出要求**：
  创建 `schedule.json`，包含：
  - 每个任务分配给哪个agent
  - 任务的执行顺序和时间
  - 资源使用情况
  - 预计总完成时间
  
  **注意**：
  - 某些任务有特殊要求（需要特定能力或资源）
  - agent之间有协作成本
  - 需要平衡负载和效率
  - 要考虑失败恢复策略
  
  不要只是简单分配，需要优化整体效率。
