steps:
- Read all input files to understand system state.
- Analyze agent capabilities and current workload.
- Identify task dependencies and critical path.
- Check resource constraints for each time slot.
- Create initial task assignment.
- Optimize for parallel execution and load balancing.
- Handle special requirements and constraints.
- Generate final schedule with timing and resource allocation.
expected_outcome: A valid schedule.json that assigns all tasks to agents, respects dependencies and resource limits, and minimizes total completion time. The schedule should be feasible and reasonably optimized.
scoring_criteria:
- All tasks are assigned to capable agents.
- Dependencies are respected (tasks execute after their dependencies).
- Resource constraints are not violated at any time.
- Schedule is reasonably optimized (not obviously inefficient).
- Special requirements are handled correctly.
- Load balancing is considered.
- Total completion time is within acceptable range.
