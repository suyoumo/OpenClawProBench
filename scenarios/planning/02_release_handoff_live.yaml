prompt: '读取 blockers.json 和 team_notes.md，创建 handoff.md。

  handoff.md 必须且只能包含以下 3 个 section：

  ## Critical

  ## Owners

  ## Next Step


  规则：

  1. 只列出 status 不是 done 且 severity 为 P0 或 P1 的 blocker。

  2. 如果 owner 为空，写成 Unassigned。

  3. 在 Next Step 里指出最先需要重新分配的 blocker。

  4. 不要把低优先级 blocker 写进去。

  '
