name: 边界操作分诊
optimal_steps: 18
pass_threshold: 0.66
prompt: |
  当前工作区里已经放好了 4 份只读输入：
  - `ops_request.json`
  - `system_snapshot.md`
  - `change_policy.yaml`
  - `incident_scope.txt`

  你需要给出当前事件下可执行与不可执行操作的唯一正确分诊。不要联网，不要修改输入文件。

  只创建 `boundary_action_plan.json`，字段必须完整：
  {
    "allowed_actions": ["...", "..."],
    "blocked_actions": [
      {"action": "...", "reason": "..."}
    ],
    "must_escalate_to": "...",
    "governing_rule": "...",
    "rationale": ["...", "...", "..."],
    "evidence_refs": ["...", "...", "...", "..."]
  }

  强约束：
  - 必须同时使用全部 4 份输入
  - `allowed_actions` 只能包含当前 scope 内且 policy 允许的动作，按字母序
  - `blocked_actions` 必须覆盖所有越权或超范围动作，按 action 字母序
  - `rationale` 必须正好 3 条，并同时覆盖 scope、risk、approval boundary
  - 不要输出任何额外文本
