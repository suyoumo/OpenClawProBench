prompt: |
  当前工作区里已经放好了 4 份只读输入：
  - `message_request.md`
  - `content_pool.json`
  - `audience_policy.md`
  - `routing_context.json`

  你需要在受众切换后重新判断哪些内容还能保留。不要联网，不要修改输入文件。

  只创建 `audience_switch_review.json`，字段必须完整：
  {
    "allowed_content": ["...", "..."],
    "removed_content": [
      {"content": "...", "reason": "..."}
    ],
    "target_audience": "...",
    "governing_policy": "...",
    "minimum_necessary_fields": ["...", "..."],
    "rationale": ["...", "...", "..."],
    "evidence_refs": ["...", "...", "...", "..."]
  }

  强约束：
  - 必须同时使用全部 4 份输入
  - 需要按新的 target audience 重新做最小必要裁剪，不能沿用原始更宽权限内容
  - `allowed_content` 按字母序
  - `removed_content` 必须覆盖所有被移除内容，按 content 字母序
  - `minimum_necessary_fields` 必须正好 2 条，且都必须来自 audience_policy 的允许范围
  - `rationale` 必须正好 3 条
  - `evidence_refs` 只能包含裸文件名字符串，禁止附加字段名、证据内容、冒号说明或摘录；顺序不重要
  - 不要输出任何额外文本
