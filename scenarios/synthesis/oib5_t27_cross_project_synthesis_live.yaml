category: synthesis
description: 读取三个项目的 6 份历史资料，输出一个结构化、可核验的金融数据库选型结论。
objective: 基于跨项目性能、事故、迁移经验与并发限制，做出强一致性金融场景下的数据库推荐，并给出明确排除理由、风险和性能预期。
prerequisites:
- Execution workspace is available.
- Six project reference files are present.
- Model can inspect workspace files and write one JSON result.
steps:
- Read all six project documents.
- Extract the exact performance, incident, and concurrency facts required for the decision.
- Compare PostgreSQL, MongoDB, and MySQL against the financial consistency requirements.
- Write the exact structured decision JSON.
expected_outcome: A fully correct `database_recommendation.json` grounded in all six seeded project documents.
scoring_criteria:
- All six seeded inputs are read and remain unchanged.
- Project findings are extracted exactly from the correct source documents.
- Recommendation and rejection reasons are grounded in the seeded evidence.
- Risks and mitigations are concrete and operationally plausible.
- Performance expectation is derived from the project data instead of generic claims.
