prompt: |
  当前工作区里已经放好了 4 份只读输入：
  - `claims.json`
  - `observations.md`
  - `resolution_policy.md`
  - `output_spec.json`

  你需要在冲突结论中确定唯一成立的结论链。不要联网，不要修改输入文件。

  只创建 `conflict_resolution_chain.json`，字段必须完整：
  {
    "winning_claim": "...",
    "invalidated_claims": [
      {"claim": "...", "reason": "..."}
    ],
    "conflict_chain": ["...", "...", "..."],
    "governing_resolution_rule": "...",
    "evidence_refs": ["...", "...", "...", "..."]
  }

  强约束：
  - 必须同时使用全部 4 份输入
  - `winning_claim` 必须是唯一与 observations 和 resolution_policy 同时一致的 claim
  - `invalidated_claims` 必须覆盖所有未选 claim，按 claim 字母序
  - `conflict_chain` 必须正好 3 条
  - 不要输出任何额外文本
