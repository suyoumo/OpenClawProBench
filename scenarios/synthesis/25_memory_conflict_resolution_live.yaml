prompt: |
  当前工作区里已经放好了 1 份只读输入：
  - `memory_conflicts.json`

  请创建 `memory_resolution.json`，字段必须完整：
  {
    "current_escalation_room": "...",
    "stale_entries": ["..."],
    "current_entries": ["..."],
    "external_option_blocked": true,
    "reason": "..."
  }

  规则：
  - 必须区分 stale 与 current
  - 当前有效 escalation room 必须来自最新 current 记录
  - 如果 external updates require director approval，则 external_option_blocked 必须为 true
