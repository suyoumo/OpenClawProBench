id: synthesis_10_cross_modal_reasoning_live
name: 跨模态事故重建（重构版）
optimal_steps: 16
pass_threshold: 0.65
prompt: |
  你是值班事故复盘负责人。当前工作区里已经放好了 5 份只读证据：
  - `application.log`
  - `metrics.json`
  - `users.csv`
  - `screenshot.txt`
  - `buggy_code.py`

  此外还有 3 份只读 codebook，用来约束输出值必须使用规范化 code：
  - `event_catalog.json`
  - `incident_taxonomy.json`
  - `fix_catalog.json`

  目标：综合证据并从 codebook 中选择正确的规范化 code，输出一份机器可校验的事故重建结论。不要联网，不要修改输入文件。

  只创建 `incident_story.json`，字段必须完整且值必须使用下面的规范化结论：
  {
    "timeline": [
      {"time": "...", "event": "..."}
    ],
    "affected_user": "...",
    "trigger_action": "...",
    "ui_symptom": "...",
    "root_cause": "...",
    "causal_chain": ["...", "...", "...", "...", "..."],
    "fix_recommendations": ["...", "...", "..."],
    "confidence": "...",
    "evidence_refs": ["...", "...", "...", "...", "..."]
  }

  强约束：
  - `timeline.event`、`trigger_action`、`ui_symptom`、`root_cause`、`causal_chain`、`fix_recommendations` 的值必须来自对应 codebook，不能自造
  - 必须同时使用全部 5 份证据，不能只看单一来源
  - 必须同时读取 codebook，不能凭空猜测规范化 code
  - `timeline` 必须正好 5 个事件，且按时间升序
  - `confidence` 只能是 `high`
  - 不要输出任何额外文本
